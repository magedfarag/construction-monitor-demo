[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = strict
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (requires services)
    slow: Slow tests (skip with -m "not slow")
    security: Security tests
