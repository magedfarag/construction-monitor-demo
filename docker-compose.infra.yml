version: "3.9"

# Infrastructure-only services for local development
# Run with: docker-compose -f docker-compose.infra.yml up -d
# This starts only stable services (Redis, PostgreSQL, MinIO)
# Run api/worker/beat from console for faster iteration

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  db:
    image: postgis/postgis:16-3.4-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: geoint
      POSTGRES_USER: geoint
      POSTGRES_PASSWORD: geoint
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoint -d geoint"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO object storage with automatic bucket creation
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb --ignore-existing local/raw;
      /usr/bin/mc mb --ignore-existing local/exports;
      /usr/bin/mc mb --ignore-existing local/thumbnails;
      /usr/bin/mc mb --ignore-existing local/artifacts;
      /usr/bin/mc anonymous set download local/thumbnails;
      echo 'Buckets ready: raw exports thumbnails artifacts';
      exit 0;
      "

volumes:
  minio-data:
  postgres-data:
