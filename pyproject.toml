[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Markers
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (requires services)
    slow: Slow tests (mark for skipping with -m "not slow")
    security: Security tests

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Asyncio
asyncio_mode = strict

# Coverage
[coverage:run]
branch = true
source = backend/app
omit =
    */tests/*
    */conftest.py
    */__main__.py

[coverage:report]
# Exclude certain patterns from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    class .*\(Protocol\):
    if sys.version_info
    if hasattr(sys, 'implementation'):
    @overload
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
